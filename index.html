<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 디텍티브: 분석 기획 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;900&display=swap');
        body { font-family: 'Pretendard', -apple-system, sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .logic-border { border: 2px dashed #6366f1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, 
            BarChart, Bar, Cell, ComposedChart, Area, LabelList
        } = window.Recharts;

        // 아이콘 래퍼 컴포넌트 (React DOM 충돌 방지)
        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current, attrs: { width: size, height: size } });
                }
            }, [name, size]);
            return <span ref={spanRef} className={`inline-flex items-center justify-center align-middle ${className}`} style={{ width: size, height: size, minWidth: size, minHeight: size }} />;
        };

        const App = () => {
            const [stage, setStage] = useState(0);
            const [showDataSheet, setShowDataSheet] = useState(false);
            const [errorFeedback, setErrorFeedback] = useState("");
            
            // States
            const [s1Decision, setS1Decision] = useState(null);
            const [s1Target, setS1Target] = useState(null);
            const [s1Criteria, setS1Criteria] = useState(null);
            const [s2Hypothesis, setS2Hypothesis] = useState(null);
            const [s3Strategy, setS3Strategy] = useState([]);
            const [s4InputMax, setS4InputMax] = useState("");
            const [s4InputThreshold, setS4InputThreshold] = useState("");
            const [finalDecision, setFinalDecision] = useState(null);
            const [reviewTab, setReviewTab] = useState(0);

            // --- 원시 데이터셋 (마케팅비, CS점수 등 노이즈 데이터 추가) ---
            const rawData = useMemo(() => [
                { month: '1월', rev: 5200, cost: 3600, profit: 1600, newRev: 1400, oldRev: 3800, waitTime: 8, waste: 12, takeoutPct: 40, mktSpend: 150, csScore: 9.2 },
                { month: '2월', rev: 4900, cost: 3650, profit: 1250, newRev: 1450, oldRev: 3450, waitTime: 9, waste: 14, takeoutPct: 41, mktSpend: 150, csScore: 9.0 },
                { month: '3월', rev: 4300, cost: 3750, profit: 550,  newRev: 1500, oldRev: 2800, waitTime: 13, waste: 25, takeoutPct: 40, mktSpend: 200, csScore: 8.1 }, // 프랜차이즈 오픈, 매니저 교체, 마케팅비 증가
                { month: '4월', rev: 3800, cost: 3800, profit: 0,    newRev: 1450, oldRev: 2350, waitTime: 17, waste: 28, takeoutPct: 39, mktSpend: 200, csScore: 7.5 }, 
                { month: '5월', rev: 3300, cost: 3950, profit: -650, newRev: 1550, oldRev: 1750, waitTime: 22, waste: 32, takeoutPct: 40, mktSpend: 250, csScore: 6.8 }, // 적자 시작, 마케팅 집중
                { month: '6월', rev: 3000, cost: 4100, profit: -1100,newRev: 1480, oldRev: 1520, waitTime: 28, waste: 38, takeoutPct: 41, mktSpend: 250, csScore: 6.2 }, 
            ], []);

            // 4단계 차트용 세분화된 데이터 (임계점 학습용)
            const chartData = useMemo(() => [
                { time: '08:00 - 10:30', wait: 8, churn: 4, total: 45, left: 2 },
                { time: '11:30 - 12:30', wait: 22, churn: 65, total: 80, left: 52 },
                { time: '12:30 - 13:30', wait: 28, churn: 88, total: 120, left: 105 },
                { time: '14:30 - 17:00', wait: 14, churn: 18, total: 60, left: 11 },
            ], []); // 시간대별(시계열) 순서대로 정렬 유지, 현실적인 일평균 모수로 스케일 조정

            const steps = ["문제 정의", "가설 수립", "검증전략 설계", "데이터 추출·해석", "실행과제 도출"];
            const reviewSteps = ["1. 지표의 위계 (목적 vs 수단)", "2. 표면적 현상 vs 근본 원인", "3. 검증 모델의 필수 조건", "4. 임계점(Threshold)의 발견", "5. 기회비용과 솔루션 일치"];

            const nextStage = () => { setErrorFeedback(""); setStage(prev => prev + 1); };
            const prevStage = () => { setErrorFeedback(""); setStage(prev => Math.max(0, prev - 1)); };
            const reset = () => {
                setStage(0); setShowDataSheet(false); setErrorFeedback("");
                setS1Decision(null); setS1Target(null); setS1Criteria(null);
                setS2Hypothesis(null); setS3Strategy([]); setS4InputMax(""); setS4InputThreshold(""); setFinalDecision(null);
                setReviewTab(0);
            };

            const toggleStrategy = (item) => {
                if (s3Strategy.includes(item)) {
                    setS3Strategy(s3Strategy.filter(i => i !== item));
                } else {
                    if (s3Strategy.length >= 3) { setErrorFeedback("검증 전략은 핵심 변수 3가지만 선택해야 합니다."); return; }
                    setS3Strategy([...s3Strategy, item]); setErrorFeedback("");
                }
            };

            const DataSheetModal = () => showDataSheet && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                    <div className="relative w-full max-w-[1400px] bg-white rounded-[24px] shadow-2xl overflow-hidden fade-in border border-slate-200 flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-100 shrink-0">
                            <h3 className="font-black text-slate-900 text-lg flex items-center gap-2 tracking-tight">
                                <Icon name="table" className="text-indigo-600"/> 데이터 빈즈 경영 분석 데이터 시트 (Raw Data)
                            </h3>
                            <button onClick={() => setShowDataSheet(false)} className="p-2 hover:bg-slate-300 rounded-full transition-all"><Icon name="x" size={20} /></button>
                        </div>
                        <div className="p-5 bg-indigo-50 border-b border-indigo-100 shrink-0 flex gap-4 text-indigo-900 font-medium text-sm leading-relaxed">
                            <Icon name="info" className="text-indigo-600 shrink-0 mt-1" />
                            <div className="space-y-3 w-full">
                                <p>
                                    <strong className="font-black text-indigo-800 text-base block mb-1">CEO의 브리핑:</strong>
                                    "3월, 매장 건너편에 대형 프랜차이즈 <strong className="text-indigo-800 bg-indigo-200 px-1.5 py-0.5 rounded">스타커피</strong>가 오픈한 이후 매니저를 교체했소.<br/>
                                    <span className="bg-amber-200 text-amber-900 px-1.5 py-0.5 rounded font-bold">마케팅 비용을 늘렸는데도</span> 오히려 적자로 전환됐고, 고객 만족도(CS)마저 곤두박질치고 있소.<br/>
                                    도대체 우리 매장의 진짜 문제가 뭐요?"
                                </p>
                                <div className="bg-red-50 p-3 rounded-lg border border-red-100 mt-2">
                                    <p className="text-red-600 font-bold text-xs flex items-center gap-1 mb-1">
                                        <Icon name="alert-triangle" size={14}/> 분석가 주의사항
                                    </p>
                                    <p className="text-red-500 text-xs">결과(후행지표)와 원인(선행지표)을 혼동하지 마십시오. 표면적인 현상 뒤에 숨은 '진짜 레버리지'를 찾아야 합니다.</p>
                                </div>
                            </div>
                        </div>
                        <div className="p-6 overflow-auto scrollbar-hide">
                            <table className="w-full text-left text-sm border-collapse min-w-[1000px]">
                                <thead>
                                    <tr className="border-b-4 border-slate-300 text-xs font-black text-slate-500 uppercase bg-slate-50">
                                        <th className="p-4">월별</th>
                                        <th className="p-4 text-indigo-700">영업이익<br/><span className="text-[10px] text-indigo-400">(만원)</span></th>
                                        <th className="p-4">매출액<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4">총비용<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4 bg-slate-100">신규고객 매출<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4 bg-slate-100 border-r border-slate-200">재방문 단골매출<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4 text-emerald-700">마케팅 집행비<br/><span className="text-[10px] text-emerald-500">(만원)</span></th>
                                        <th className="p-4 text-blue-600">고객만족도<br/><span className="text-[10px] text-blue-400">(10점 만점)</span></th>
                                        <th className="p-4 text-amber-700">고객 대기시간<br/><span className="text-[10px] text-amber-500">(피크타임/분)</span></th>
                                        <th className="p-4 text-red-600">원재료 폐기량<br/><span className="text-[10px] text-red-400">(kg)</span></th>
                                        <th className="p-4 bg-slate-100 text-slate-600">포장 고객 비중<br/><span className="text-[10px] text-slate-400">(%)</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {rawData.map((d, i) => (
                                        <tr key={i} className={`border-b border-slate-100 hover:bg-slate-50 font-mono ${d.profit < 0 ? 'bg-red-50/50' : ''}`}>
                                            <td className="p-4 font-black text-slate-900 font-sans">{d.month}</td>
                                            <td className={`p-4 font-black text-lg ${d.profit < 0 ? 'text-red-600' : 'text-indigo-600'}`}>{d.profit.toLocaleString()}</td>
                                            <td className="p-4">{d.rev.toLocaleString()}</td>
                                            <td className="p-4">{d.cost.toLocaleString()}</td>
                                            <td className="p-4 bg-slate-50/50">{d.newRev.toLocaleString()}</td>
                                            <td className="p-4 bg-slate-50/50 font-bold border-r border-slate-200">{d.oldRev.toLocaleString()}</td>
                                            <td className="p-4 text-emerald-600">{d.mktSpend}</td>
                                            <td className="p-4 font-bold text-blue-500">{d.csScore}</td>
                                            <td className="p-4 font-black text-amber-600">{d.waitTime}</td>
                                            <td className="p-4 font-bold text-red-500">{d.waste}</td>
                                            <td className="p-4 bg-slate-50/50 font-bold text-slate-500">{d.takeoutPct}%</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            if (stage === 0) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+')] opacity-20"></div>
                    <div className="max-w-3xl w-full bg-white rounded-[32px] shadow-2xl p-12 md:p-16 text-center relative z-10 fade-in border border-slate-800">
                        <div className="inline-block p-6 bg-indigo-600 rounded-[24px] mb-8 shadow-xl shadow-indigo-500/30 transform -rotate-3">
                            <Icon name="bar-chart-2" size={48} className="text-white" />
                        </div>
                        <h1 className="text-4xl font-black text-slate-900 mb-4 tracking-tighter uppercase">데이터 분석 기획 마스터</h1>
                        <p className="text-indigo-600 font-bold tracking-widest uppercase text-sm mb-10">Advanced Analytics Planning Simulator</p>
                        <div className="bg-slate-50 p-8 rounded-2xl border border-slate-200 text-left mb-10 space-y-5">
                            <p className="text-slate-800 font-black text-lg mb-2 flex items-center gap-2"><Icon name="target" className="text-amber-500"/> 미션 브리핑:</p>
                            <p className="text-slate-600 text-sm md:text-base leading-relaxed flex gap-3">
                                <Icon name="check-circle" size={20} className="text-emerald-500 shrink-0 mt-1"/> 
                                <span>6개월 만에 흑자에서 적자로 돌아선 '데이터 빈즈'를 살려내야 합니다.<br/>당신은 CEO의 특명을 받은 데이터 전략가입니다.</span>
                            </p>
                            <p className="text-slate-600 text-sm md:text-base leading-relaxed flex gap-3">
                                <Icon name="check-circle" size={20} className="text-emerald-500 shrink-0 mt-1"/> 
                                <span><strong>문제정의 → 가설수립 → 검증설계 → 데이터 추출/해석 → 실행과제</strong><br/>총 5단계를 철저한 논리에 기반해 기획하십시오.</span>
                            </p>
                            <div className="p-4 bg-red-50 rounded-xl border border-red-100 flex gap-3 mt-4">
                                <Icon name="alert-triangle" size={20} className="text-red-500 shrink-0 mt-1"/>
                                <span className="text-red-700 font-bold text-sm md:text-base leading-relaxed">
                                    경고: 데이터 시트에는 실무처럼 의미 없는 노이즈(Noise)와 함정이 섞여 있습니다.<br/>
                                    현상과 원인을 혼동하는 논리적 비약을 저지르면 즉시 피드백이 가해집니다.
                                </span>
                            </div>
                        </div>
                        <button onClick={nextStage} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-indigo-600 transition-all active:scale-95 shadow-xl">실무 분석 프로젝트 투입</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-900">
                    <header className="w-full bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-md">
                        <div className="max-w-[1200px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-indigo-600 rounded-lg"><Icon name="cpu" size={20} /></div>
                                <h1 className="font-black tracking-tighter uppercase italic text-lg">Analytics Workspace</h1>
                            </div>
                            {stage < 7 && (
                                <div className="flex flex-wrap gap-1 justify-center">
                                    {steps.map((label, i) => (
                                        <div key={i} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${stage === i + 1 ? 'bg-indigo-500 text-white shadow-lg' : stage > i + 1 ? 'bg-emerald-500/20 text-emerald-400' : 'text-slate-500'}`}>
                                            {i+1}. {label}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </header>

                    <DataSheetModal />

                    <main className="flex-1 p-6 md:p-10 max-w-[1200px] mx-auto w-full flex flex-col gap-8 pb-40">
                        
                        {/* Stage 1: 문제 정의 */}
                        {stage === 1 && (
                            <div className="space-y-8 fade-in">
                                <div className="flex justify-between items-end">
                                    <div className="space-y-2">
                                        <h2 className="text-3xl font-black tracking-tight">1. 문제 정의 (Problem Definition)</h2>
                                        <p className="text-slate-500 font-medium">데이터 시트를 확인 후, 분석 프로젝트의 방향타가 될 '문제 정의'를 논리적으로 완성하십시오.</p>
                                    </div>
                                    <button onClick={() => setShowDataSheet(true)} className="flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-lg hover:bg-indigo-700 transition-all animate-pulse"><Icon name="table" size={18}/> 원본 데이터 시트 열람</button>
                                </div>

                                <div className="bg-white p-8 rounded-[24px] shadow-sm border border-slate-200">
                                    <h4 className="text-sm font-bold text-slate-500 mb-6 uppercase tracking-widest text-center">전체 손익 추이 (P&L Trend)</h4>
                                    <div className="h-64 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={rawData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="month" axisLine={false} tickLine={false} tick={{fontSize: 12, fontWeight: 700}} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fontSize: 12}} />
                                                <Tooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)' }} />
                                                <Area type="monotone" dataKey="rev" fill="#818cf8" fillOpacity={0.1} stroke="none" />
                                                <Line type="monotone" dataKey="rev" name="매출(만원)" stroke="#6366f1" strokeWidth={4} />
                                                <Line type="monotone" dataKey="cost" name="비용(만원)" stroke="#94a3b8" strokeWidth={3} strokeDasharray="6 6" />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="bg-slate-900 rounded-[24px] p-8 text-white shadow-2xl space-y-8">
                                    <h3 className="text-amber-400 font-black uppercase tracking-widest text-sm flex items-center gap-2"><Icon name="edit-3" size={18}/> 문제 정의 프레임워크</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="space-y-3">
                                            <p className="font-bold text-indigo-300">Q1. 목적 (무엇을 바꿀 것인가?)</p>
                                            {['외형적 매출 규모의 확대', '적자 구조 개선(이익 흑자 전환)', '고객 만족도(CS) 9점 달성'].map(opt => (
                                                <button key={opt} onClick={() => setS1Decision(opt)} className={`w-full text-left p-4 rounded-xl border-2 transition-all text-sm font-bold ${s1Decision === opt ? 'border-indigo-500 bg-indigo-500 text-white' : 'border-slate-700 text-slate-300 hover:border-slate-500'}`}>{opt}</button>
                                            ))}
                                        </div>
                                        <div className="space-y-3">
                                            <p className="font-bold text-emerald-300">Q2. 타겟 (누구에 대한 결정인가?)</p>
                                            {['마케팅 유입 신규 고객', '재방문(단골) 고객', '포장(Take-out) 고객'].map(opt => (
                                                <button key={opt} onClick={() => setS1Target(opt)} className={`w-full text-left p-4 rounded-xl border-2 transition-all text-sm font-bold ${s1Target === opt ? 'border-emerald-500 bg-emerald-500 text-white' : 'border-slate-700 text-slate-300 hover:border-slate-500'}`}>{opt}</button>
                                            ))}
                                        </div>
                                        <div className="space-y-3">
                                            <p className="font-bold text-amber-300">Q3. 기준 (성공의 평가 지표는?)</p>
                                            {['원재료 폐기량 10kg 미만', '영업이익률 +10% 복귀', '마케팅 투자 대비 수익률(ROI) 개선'].map(opt => (
                                                <button key={opt} onClick={() => setS1Criteria(opt)} className={`w-full text-left p-4 rounded-xl border-2 transition-all text-sm font-bold ${s1Criteria === opt ? 'border-amber-500 bg-amber-500 text-white' : 'border-slate-700 text-slate-300 hover:border-slate-500'}`}>{opt}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="p-6 bg-slate-800 rounded-xl border border-slate-700 flex flex-col gap-4">
                                        <p className="text-xs text-slate-400 uppercase tracking-widest font-bold">최종 문제 정의(Problem Statement)</p>
                                        <p className="text-lg leading-relaxed font-medium text-white">

                                        { id: 'opt1', title: '운영 병목 제거 (스마트 오더 전면 도입)', desc: '피크타임 대기 시간을 고객 임계점(22분) 미만인 10분으로 단축시켜, 단골 고객의 이탈을 원천 차단합니다.', impact: '데이터 기반 최적 솔루션' },
                                        { id: 'opt2', title: '피크타임 전용 간편 메뉴(Ready-to-go) 출시', desc: '대기 시간을 줄일 수 있는 좋은 차선책이나, 기존 객단가를 하락시켜 목표인 영업이익 흑자 전환이 더뎌질 위험이 존재합니다.', impact: '기회비용 손실(차선책)' },
                                        { id: 'opt3', title: '고객 달래기 (대기 고객 무료 쿠폰 발급)', desc: 'CS 점수는 일시적으로 방어할 수 있으나, 비용 증가로 인해 적자 구조가 심화되며 병목이라는 근본 원인은 그대로 남습니다.', impact: '수단과 목적 전도' },
                                        { id: 'opt4', title: '비용 절감 (저가 원재료 변경 및 인력 감축)', desc: '당장의 장부상 이익은 개선될지 몰라도, 대기 시간 악화와 품질 저하로 단골 베이스가 완전히 붕괴됩니다.', impact: '논리 비약 최악의 수' }
                                    ].map(opt => (
                                        <button key={opt.id} onClick={() => setFinalDecision(opt.id)} className={`p-8 text-left border-2 rounded-[24px] transition-all relative ${finalDecision === opt.id ? 'border-indigo-600 bg-indigo-50 shadow-lg scale-[1.02]' : 'border-slate-200 bg-white hover:border-indigo-300'}`}>
                                            <div className="flex justify-between items-start mb-3">
                                                <span className="text-xl font-black text-slate-900 leading-tight">{opt.title}</span>
                                            </div>
                                            <p className="text-sm text-slate-600 font-medium leading-relaxed">{opt.desc}</p>
                                            {finalDecision === opt.id && <span className={`inline-block mt-4 text-[10px] font-bold px-3 py-1 rounded-md uppercase tracking-widest bg-indigo-600 text-white`}>Selected Action</span>}
                                        </button>
                                    ))}
                                </div>
                                {errorFeedback && <p className="text-red-500 font-bold text-center mt-4 bg-red-50 p-4 rounded-xl">{errorFeedback}</p>}
                                <button 
                                    onClick={() => {
                                        if (finalDecision !== 'opt1') {
                                            setErrorFeedback("경고: 선택하신 솔루션은 데이터가 가리키는 근본 문제(대기시간 임계점 돌파)를 직접적으로 해결하면서 동시에 목표(적자 개선)를 달성하는 최적해(Best Practice)가 아닙니다. 설명(기회비용)을 다시 읽고 재고해 보십시오.");
                                            return;
                                        }
                                        nextStage();
                                    }} 
                                    className="w-full mt-8 bg-slate-900 text-white py-6 rounded-[24px] font-black text-xl hover:bg-slate-800 transition-all active:scale-95 shadow-xl disabled:opacity-30" 
                                    disabled={!finalDecision}
                                >
                                    최종 데이터 기획 리포트 제출
                                </button>
                            </div>
                        )}

                        {/* Stage 6: 결과 화면 */}
                        {stage === 6 && (
                            <div className="min-h-screen bg-slate-900 fixed inset-0 z-[200] flex items-center justify-center p-6 fade-in overflow-auto py-10 scrollbar-hide">
                                <div className="max-w-3xl w-full bg-white rounded-[40px] overflow-hidden shadow-2xl flex flex-col">
                                    <div className={`p-16 text-center text-white relative ${finalDecision === 'opt1' ? 'bg-indigo-600' : 'bg-red-600'}`}>
                                        <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-6 backdrop-blur-md shadow-lg border border-white/30">
                                            <Icon name={finalDecision === 'opt1' ? "check" : "x"} size={40} />
                                        </div>
                                        <h2 className="text-4xl font-black mb-2 tracking-tighter uppercase">{finalDecision === 'opt1' ? '기획 성공: 흑자 전환' : '기획 실패: 폐업'}</h2>
                                        <p className="text-white/80 font-bold text-sm tracking-widest uppercase">{finalDecision === 'opt1' ? '완벽한 논리적 기획 프로세스' : '데이터와 실행 과제의 불일치'}</p>
                                    </div>
                                    <div className="p-12 flex-1 flex flex-col justify-center">
                                        <div className="bg-slate-50 p-8 rounded-2xl text-center border border-slate-200 mb-8">
                                            <h4 className="font-black text-xl text-slate-800 mb-6">시뮬레이션 요약 (Executive Summary)</h4>
                                            {finalDecision === 'opt1' ? (
                                                <p className="text-slate-600 text-sm md:text-base leading-relaxed font-medium space-y-4">
                                                    <span className="block">당신은 마케팅 비용 증가나 CS 점수 하락 같은 <span className="font-bold text-slate-800 bg-slate-200 px-1.5 py-0.5 rounded">함정(Noise)</span>에 속지 않고,<br/>매출 급감의 진짜 원인인 '단골 고객'을 타겟팅했습니다.</span>
                                                    <span className="block">나아가 고객이 이탈하는 <span className="font-bold text-slate-800 bg-amber-200 px-1.5 py-0.5 rounded">대기 시간 임계점(22분)</span>을 정확히 찾아내어<br/>과감한 시스템 개선(스마트 오더)을 이끌어냈습니다.</span>
                                                    <span className="block text-indigo-600 font-bold mt-4">이는 논리적 데이터 기획의 완벽한 정석입니다.</span>
                                                </p>
                                            ) : (
                                                <p className="text-slate-600 text-sm md:text-base leading-relaxed font-medium space-y-4">
                                                    <span className="block">원인(대기 시간으로 인한 단골 이탈)을 정확히 도출해 놓고도,<br/>전혀 상관없는 실행 과제를 선택했습니다.</span>
                                                    <span className="block text-red-600 font-bold mt-4">기획의 앞뒤 논리가 연결되지 않아 비즈니스 문제는 더욱 악화되었습니다.</span>
                                                </p>
                                            )}
                                        </div>
                                        
                                        <div className="mt-4 p-8 bg-indigo-50 border border-indigo-200 rounded-3xl text-left">
                                            <h4 className="font-black text-indigo-900 mb-4 flex items-center gap-2 text-xl"><Icon name="book-open" size={24}/> 학습은 지금부터 시작입니다.</h4>
                                            <p className="text-sm md:text-base text-indigo-800 mb-8 leading-relaxed">
                                                왜 특정 선택지가 오답(함정)이었을까요?<br/>내 기획의 흐름 중 어느 부분에서 오류가 발생하기 쉬울까요?<br/><br/>
                                                <strong>실무 분석가의 관점에서 기획의 5단계 논리를 철저하게 해부하는 복기(Post-Mortem) 리포트</strong>를 꼭 확인하십시오.
                                            </p>
                                            <button onClick={nextStage} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black hover:bg-indigo-700 transition-all shadow-lg active:scale-95 text-lg">
                                                상세 분석 기획 복기 (Post-Mortem) 펼치기
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Stage 7: Post-Mortem (학습 리포트) */}
                        {stage === 7 && (
                            <div className="space-y-8 fade-in pb-10">
                                <div className="space-y-2 mb-10 text-center">
                                    <h2 className="text-4xl font-black tracking-tight flex items-center justify-center gap-3"><Icon name="file-text" className="text-indigo-600" size={36}/> 데이터 분석 기획 복기 리포트</h2>
                                    <p className="text-slate-500 font-medium text-lg">5단계 기획 과정에서 실무자들이 90% 이상 빠지는 <strong>'논리적 오류의 함정'</strong>을 해부합니다.</p>
                                </div>

                                <div className="flex flex-col md:flex-row gap-8 items-start">
                                    {/* 탭 메뉴 */}
                                    <div className="w-full md:w-1/3 flex flex-col gap-3 sticky top-24">
                                        {reviewSteps.map((step, idx) => (
                                            <button 
                                                key={idx} 
                                                onClick={() => setReviewTab(idx)}
                                                className={`p-5 rounded-2xl text-left font-black transition-all border-2 text-sm ${reviewTab === idx ? 'bg-indigo-600 text-white border-indigo-600 shadow-xl translate-x-3' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300'}`}
                                            >
                                                {step}
                                            </button>
                                        ))}
                                        <button onClick={reset} className="mt-10 p-5 bg-slate-900 text-white rounded-2xl font-black hover:bg-slate-800 transition-all text-center flex items-center justify-center gap-2">
                                            <Icon name="rotate-ccw" /> 처음부터 다시 시작
                                        </button>
                                    </div>

                                    {/* 탭 콘텐츠 */}
                                    <div className="w-full md:w-2/3 bg-white rounded-[32px] shadow-sm border border-slate-200 p-8 md:p-12 min-h-[500px]">
                                        {reviewTab === 0 && (
                                            <div className="space-y-6 fade-in">
                                                <h3 className="text-3xl font-black text-slate-800 mb-4 border-b-4 border-indigo-100 pb-4">1단계: 지표의 위계 (목적 vs 수단)</h3>
                                                <p className="text-slate-600 leading-relaxed text-lg font-medium">많은 기획자들이 문제 정의 시 '고객 만족도 9점 달성'처럼 표면적인 수단(선행지표)을 목적(후행지표)으로 착각합니다.</p>
                                                <div className="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                                                    <p className="font-black text-indigo-700 mb-3 text-lg">💡 실무적 Insight</p>
                                                    <p className="text-base leading-relaxed text-slate-700">문제 정의의 기준은 <strong>항상 최상위 재무 지표(영업이익)</strong>에 맞춰져야 합니다. 또한 대상을 '포장 고객'이나 전체 매출로 두루뭉술하게 잡지 않고, 데이터 시트에서 매출 하락을 주도한 핵심 환부인 '재방문 고객'으로 정확히 좁혀낸(Narrow-down) 것이 이번 기획 성공의 첫 단추였습니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 1 && (
                                            <div className="space-y-6 fade-in">
                                                <h3 className="text-3xl font-black text-slate-800 mb-4 border-b-4 border-indigo-100 pb-4">2단계: 표면적 현상 vs 근본 원인</h3>
                                                <p className="text-slate-600 leading-relaxed text-lg font-medium">경쟁사 오픈, CS 점수 하락 등 눈에 띄는 자극적인 현상에 매몰되면 '확증 편향'에 빠집니다.</p>
                                                <div className="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                                                    <p className="font-black text-indigo-700 mb-3 text-lg">💡 실무적 Insight</p>
                                                    <p className="text-base leading-relaxed text-slate-700">CS 점수 하락은 원인이 아니라, 단골들이 겪은 불만(긴 대기시간)이 표출된 결과적 <strong>현상(Symptom)</strong>일 뿐입니다. 데이터 기획자는 현상을 원인으로 착각하여 "친절 교육을 강화하자"는 식의 오류를 피하고, <strong>인과관계(Causality)</strong>를 지닌 진짜 원인(Root Cause)인 대기시간을 가설로 세워야 합니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 2 && (
                                            <div className="space-y-6 fade-in">
                                                <h3 className="text-3xl font-black text-slate-800 mb-4 border-b-4 border-indigo-100 pb-4">3단계: 검증 모델의 필수 조건</h3>
                                                <p className="text-slate-600 leading-relaxed text-lg font-medium">상관관계를 입증하려면 원인(X축)과 결과(Y축), 그리고 이를 묶어줄 환경(통제 변수)이 필요합니다.</p>
                                                <div className="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                                                    <p className="font-black text-indigo-700 mb-3 text-lg">💡 실무적 Insight</p>
                                                    <p className="text-base leading-relaxed text-slate-700">가설이 "대기시간 증가가 단골 이탈을 불렀다"라면, 단순히 대기시간 평균만 봐서는 증명할 수 없습니다. <strong>[시간대별]</strong>이라는 환경을 설정하고, 그 안에서 <strong>[대기시간(X)]</strong>과 <strong>[이탈률(Y)]</strong>이 어떻게 함께 움직이는지 '교차 분석(Cross-tabulation)'해야만 경영진을 설득할 수 있는 단단한 논리가 완성됩니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 3 && (
                                            <div className="space-y-6 fade-in">
                                                <h3 className="text-3xl font-black text-slate-800 mb-4 border-b-4 border-indigo-100 pb-4">4단계: 임계점(Threshold)의 발견</h3>
                                                <p className="text-slate-600 leading-relaxed text-lg font-medium">데이터는 비례적으로 선형(Linear) 이동하지 않고 특정 지점에서 폭발(Exponential)합니다.</p>
                                                <div className="p-6 bg-amber-50 rounded-2xl border border-amber-200">
                                                    <p className="font-black text-amber-700 mb-3 text-lg">💡 핵심 역량 Insight</p>
                                                    <p className="text-base leading-relaxed text-slate-700">초보자는 "대기시간 28분이 제일 문제다"라고만 해석합니다. 하지만 진정한 기획자는 <strong>"대기시간이 22분을 넘기는 순간부터 고객 이탈률이 18%에서 65%로 기하급수적으로 폭발(임계점 돌파)한다"</strong>는 것을 찾아냅니다. 이 임계점을 알아야 "우리는 대기시간을 무조건 20분 밑으로 줄여야 한다"는 명확한 실행 KPI가 나옵니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 4 && (
                                            <div className="space-y-6 fade-in">
                                                <h3 className="text-3xl font-black text-slate-800 mb-4 border-b-4 border-indigo-100 pb-4">5단계: 기회비용과 솔루션 일치</h3>
                                                <p className="text-slate-600 leading-relaxed text-lg font-medium">분석을 완벽히 해놓고도, 당장 눈앞의 비용을 줄이는 오판(원가 절감/쿠폰 남발)을 하는 경우가 흔합니다.</p>
                                                <div className="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                                                    <p className="font-black text-indigo-700 mb-3 text-lg">💡 실무적 Insight</p>
                                                    <p className="text-base leading-relaxed text-slate-700">문제정의(1단계)에서 우리의 목표는 '적자 구조 개선'이었습니다. 간편 메뉴 출시는 대기시간은 줄이겠지만 객단가를 낮춰 이익 개선을 더디게 하는 기회비용을 낳습니다. 매출을 까먹고 있는 <strong>진짜 병목(대기 시간)을 근본적으로 뚫어주기 위해 시스템(스마트 오더)에 투자</strong>하여 단골을 복귀시키는 것이, 데이터를 기반으로 한 최고의 전략적 의사결정입니다.</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 하단 고정 플로팅 버튼 (이전으로 가기 & 데이터 시트) */}
                    {stage > 0 && stage < 6 && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 flex gap-4 z-50">
                            <button onClick={prevStage} className="px-6 py-4 bg-white/90 backdrop-blur-md text-slate-600 border border-slate-200 rounded-full font-black text-sm hover:bg-slate-100 shadow-xl flex items-center gap-2 transition-all hover:scale-105">
                                <Icon name="arrow-left" size={18}/> 이전 단계
                            </button>
                            <button onClick={() => setShowDataSheet(true)} className="px-6 py-4 bg-indigo-600/90 backdrop-blur-md text-white border border-indigo-500 rounded-full font-black text-sm hover:bg-indigo-700 shadow-xl flex items-center gap-2 transition-all hover:scale-105">
                                <Icon name="table" size={18}/> 원본 데이터 보기
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
