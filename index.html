<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 디텍티브: 분석 기획 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;900&display=swap');
        body { font-family: 'Pretendard', -apple-system, sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .logic-border { border: 2px dashed #6366f1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, 
            BarChart, Bar, Cell, ComposedChart, Area, LabelList
        } = window.Recharts;

        // 아이콘 래퍼 컴포넌트 (React DOM 충돌 방지)
        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current, attrs: { width: size, height: size } });
                }
            }, [name, size]);
            return <span ref={spanRef} className={`inline-flex items-center justify-center align-middle ${className}`} style={{ width: size, height: size, minWidth: size, minHeight: size }} />;
        };

        const App = () => {
            const [stage, setStage] = useState(0);
            const [showDataSheet, setShowDataSheet] = useState(false);
            const [errorFeedback, setErrorFeedback] = useState("");
            
            // States
            const [s1Decision, setS1Decision] = useState(null);
            const [s1Target, setS1Target] = useState(null);
            const [s1Criteria, setS1Criteria] = useState(null);
            const [s2Hypothesis, setS2Hypothesis] = useState(null);
            const [s3Strategy, setS3Strategy] = useState([]);
            const [s4InputMax, setS4InputMax] = useState("");
            const [s4InputThreshold, setS4InputThreshold] = useState("");
            const [finalDecision, setFinalDecision] = useState(null);
            const [reviewTab, setReviewTab] = useState(0);

            // --- 원시 데이터셋 (마케팅비, CS점수 등 노이즈 데이터 추가) ---
            const rawData = useMemo(() => [
                { month: '1월', rev: 5200, cost: 3600, profit: 1600, newRev: 1400, oldRev: 3800, waitTime: 8, waste: 12, takeoutPct: 40, mktSpend: 150, csScore: 9.2 },
                { month: '2월', rev: 4900, cost: 3650, profit: 1250, newRev: 1450, oldRev: 3450, waitTime: 9, waste: 14, takeoutPct: 41, mktSpend: 150, csScore: 9.0 },
                { month: '3월', rev: 4300, cost: 3750, profit: 550,  newRev: 1500, oldRev: 2800, waitTime: 13, waste: 25, takeoutPct: 40, mktSpend: 200, csScore: 8.1 },
                { month: '4월', rev: 3800, cost: 3800, profit: 0,    newRev: 1450, oldRev: 2350, waitTime: 17, waste: 28, takeoutPct: 39, mktSpend: 200, csScore: 7.5 }, 
                { month: '5월', rev: 3300, cost: 3950, profit: -650, newRev: 1550, oldRev: 1750, waitTime: 22, waste: 32, takeoutPct: 40, mktSpend: 250, csScore: 6.8 }, 
                { month: '6월', rev: 3000, cost: 4100, profit: -1100,newRev: 1480, oldRev: 1520, waitTime: 28, waste: 38, takeoutPct: 41, mktSpend: 250, csScore: 6.2 }, 
            ], []);

            // 4단계 차트용 세분화된 데이터
            const chartData = useMemo(() => [
                { time: '08:00 - 10:30', wait: 8, churn: 4, total: 45, left: 2 },
                { time: '11:30 - 12:30', wait: 22, churn: 65, total: 80, left: 52 },
                { time: '12:30 - 13:30', wait: 28, churn: 88, total: 120, left: 105 },
                { time: '14:30 - 17:00', wait: 14, churn: 18, total: 60, left: 11 },
            ], []);

            const steps = ["문제 정의", "가설 수립", "검증전략 설계", "데이터 추출·해석", "실행과제 도출"];
            const reviewSteps = ["1. 지표의 위계 (목적 vs 수단)", "2. 표면적 현상 vs 근본 원인", "3. 검증 모델의 필수 조건", "4. 임계점(Threshold)의 발견", "5. 기회비용과 솔루션 일치"];

            const nextStage = () => { setErrorFeedback(""); setStage(prev => prev + 1); };
            const prevStage = () => { setErrorFeedback(""); setStage(prev => Math.max(0, prev - 1)); };
            const reset = () => {
                setStage(0); setShowDataSheet(false); setErrorFeedback("");
                setS1Decision(null); setS1Target(null); setS1Criteria(null);
                setS2Hypothesis(null); setS3Strategy([]); setS4InputMax(""); setS4InputThreshold(""); setFinalDecision(null);
                setReviewTab(0);
            };

            const toggleStrategy = (item) => {
                if (s3Strategy.includes(item)) {
                    setS3Strategy(s3Strategy.filter(i => i !== item));
                } else {
                    if (s3Strategy.length >= 3) { setErrorFeedback("검증 전략은 핵심 변수 3가지만 선택해야 합니다."); return; }
                    setS3Strategy([...s3Strategy, item]); setErrorFeedback("");
                }
            };

            const DataSheetModal = () => showDataSheet && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                    <div className="relative w-full max-w-[1400px] bg-white rounded-[24px] shadow-2xl overflow-hidden fade-in border border-slate-200 flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-100 shrink-0">
                            <h3 className="font-black text-slate-900 text-lg flex items-center gap-2 tracking-tight">
                                <Icon name="table" className="text-indigo-600"/> 데이터 빈즈 경영 분석 데이터 시트 (Raw Data)
                            </h3>
                            <button onClick={() => setShowDataSheet(false)} className="p-2 hover:bg-slate-300 rounded-full transition-all"><Icon name="x" size={20} /></button>
                        </div>
                        <div className="p-5 bg-indigo-50 border-b border-indigo-100 shrink-0 flex gap-4 text-indigo-900 font-medium text-sm leading-relaxed">
                            <Icon name="info" className="text-indigo-600 shrink-0 mt-1" />
                            <div className="space-y-3 w-full text-sm">
                                <p>
                                    <strong className="font-black text-indigo-800 text-base block mb-1">CEO의 브리핑:</strong>
                                    "3월, 매장 건너편에 대형 프랜차이즈 <strong className="text-indigo-800 bg-indigo-200 px-1.5 py-0.5 rounded font-black">스타커피</strong>가 오픈한 이후 매니저를 교체했소.<br/>
                                    <span className="bg-amber-200 text-amber-900 px-1.5 py-0.5 rounded font-bold">마케팅 비용을 늘렸는데도</span> 오히려 적자로 전환됐고, 고객 만족도(CS)마저 곤두박질치고 있소.<br/>
                                    도대체 우리 매장의 진짜 문제가 뭐요?"
                                </p>
                            </div>
                        </div>
                        <div className="p-6 overflow-auto scrollbar-hide">
                            <table className="w-full text-left text-sm border-collapse min-w-[1000px]">
                                <thead>
                                    <tr className="border-b-4 border-slate-300 text-xs font-black text-slate-500 uppercase bg-slate-50">
                                        <th className="p-4">월별</th>
                                        <th className="p-4 text-indigo-700">영업이익<br/><span className="text-[10px] text-indigo-400">(만원)</span></th>
                                        <th className="p-4">매출액<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4">총비용<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4 bg-slate-100">신규고객 매출<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4 bg-slate-100 border-r border-slate-200">재방문 단골매출<br/><span className="text-[10px] text-slate-400">(만원)</span></th>
                                        <th className="p-4 text-emerald-700">마케팅 집행비<br/><span className="text-[10px] text-emerald-500">(만원)</span></th>
                                        <th className="p-4 text-blue-600">고객만족도<br/><span className="text-[10px] text-blue-400">(10점 만점)</span></th>
                                        <th className="p-4 text-amber-700">고객 대기시간<br/><span className="text-[10px] text-amber-500">(피크타임/분)</span></th>
                                        <th className="p-4 text-red-600">원재료 폐기량<br/><span className="text-[10px] text-red-400">(kg)</span></th>
                                        <th className="p-4 bg-slate-100 text-slate-600">포장 고객 비중<br/><span className="text-[10px] text-slate-400">(%)</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {rawData.map((d, i) => (
                                        <tr key={i} className={`border-b border-slate-100 hover:bg-slate-50 font-mono ${d.profit < 0 ? 'bg-red-50/50' : ''}`}>
                                            <td className="p-4 font-black text-slate-900 font-sans">{d.month}</td>
                                            <td className={`p-4 font-black text-lg ${d.profit < 0 ? 'text-red-600' : 'text-indigo-600'}`}>{d.profit.toLocaleString()}</td>
                                            <td className="p-4">{d.rev.toLocaleString()}</td>
                                            <td className="p-4">{d.cost.toLocaleString()}</td>
                                            <td className="p-4 bg-slate-50/50">{d.newRev.toLocaleString()}</td>
                                            <td className="p-4 bg-slate-50/50 font-bold border-r border-slate-200">{d.oldRev.toLocaleString()}</td>
                                            <td className="p-4 text-emerald-600">{d.mktSpend}</td>
                                            <td className="p-4 font-bold text-blue-500">{d.csScore}</td>
                                            <td className="p-4 font-black text-amber-600">{d.waitTime}</td>
                                            <td className="p-4 font-bold text-red-500">{d.waste}</td>
                                            <td className="p-4 bg-slate-50/50 font-bold text-slate-500">{d.takeoutPct}%</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            if (stage === 0) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+')] opacity-20"></div>
                    <div className="max-w-[1200px] w-full bg-white rounded-[32px] shadow-2xl p-12 md:p-20 text-center relative z-10 fade-in border border-slate-800">
                        <div className="inline-block p-6 bg-indigo-600 rounded-[24px] mb-10 shadow-xl shadow-indigo-500/30 transform -rotate-3">
                            <Icon name="bar-chart-2" size={64} className="text-white" />
                        </div>
                        <h1 className="text-5xl font-black text-slate-900 mb-6 tracking-tighter uppercase italic">데이터 분석 기획 마스터</h1>
                        <p className="text-indigo-600 font-black tracking-widest uppercase text-lg mb-12 border-b-4 border-indigo-100 inline-block pb-2">Advanced Analytics Planning Simulator</p>
                        
                        <div className="bg-slate-50 p-10 rounded-[32px] border border-slate-200 text-left mb-12 space-y-10">
                            <div className="space-y-4">
                                <p className="text-slate-800 font-black text-2xl flex items-center gap-3"><Icon name="target" className="text-amber-500" size={28}/> 미션 브리핑:</p>
                                <p className="text-slate-600 text-lg md:text-xl leading-relaxed font-medium pl-10 border-l-4 border-slate-200">
                                    강남 오피스 상권의 명소였던 '데이터 빈즈'가 6개월 만에 흑자에서 적자로 돌아섰습니다.<br/>
                                    당신은 CEO의 특명을 받은 데이터 전략가가 되어 위기의 실체를 규명해야 합니다.
                                </p>
                            </div>

                            <div className="space-y-4">
                                <p className="text-slate-800 font-black text-2xl flex items-center gap-3"><Icon name="navigation" className="text-indigo-500" size={28}/> 기획 프로세스:</p>
                                <div className="pl-10 border-l-4 border-indigo-500 space-y-4">
                                    <p className="text-indigo-900 text-lg md:text-xl leading-relaxed font-black uppercase tracking-tight italic">
                                        문제정의 → 가설수립 → 검증설계 → 데이터 추출/해석 → 실행과제
                                    </p>
                                    <p className="text-slate-700 text-base md:text-lg font-bold leading-relaxed">
                                        본 시뮬레이션은 위 <span className="text-indigo-600">5단계의 논리적 연결성</span>을 직접 구축하며 체득할 수 있도록 구성되어 있습니다.<br/>
                                        데이터 기획의 정석을 익히기 위해 집중하여 학습에 임해 주시기 바랍니다.
                                    </p>
                                </div>
                            </div>

                            <div className="p-6 bg-red-50 rounded-2xl border-2 border-red-100 flex gap-5">
                                <Icon name="alert-triangle" size={32} className="text-red-500 shrink-0 mt-1"/>
                                <div className="space-y-1">
                                    <p className="text-red-700 font-black text-lg uppercase italic tracking-tighter">Warning: Logical Trap</p>
                                    <p className="text-red-600 font-bold text-base leading-relaxed">
                                        데이터 시트에는 실무 현장처럼 의미 없는 <span className="bg-red-200 px-1 rounded text-red-900">노이즈(Noise)와 함정</span>이 섞여 있습니다.<br/>
                                        현상과 원인을 혼동하거나 감에 의존하는 결정을 내리면 즉시 기획 실패로 간주됩니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                        
                        <button onClick={nextStage} className="w-full bg-slate-900 text-white py-8 rounded-[24px] font-black text-2xl hover:bg-indigo-600 transition-all active:scale-95 shadow-2xl flex items-center justify-center gap-4 group">
                            실무 분석 프로젝트 투입 <Icon name="arrow-right" size={28} className="group-hover:translate-x-2 transition-transform"/>
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-900">
                    <header className="w-full bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-md">
                        <div className="max-w-[1200px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-indigo-600 rounded-lg"><Icon name="cpu" size={20} /></div>
                                <h1 className="font-black tracking-tighter uppercase italic text-lg">Analysis Workspace</h1>
                            </div>
                            {stage < 7 && (
                                <div className="flex flex-wrap gap-1 justify-center">
                                    {steps.map((label, i) => (
                                        <div key={i} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${stage === i + 1 ? 'bg-indigo-500 text-white shadow-lg' : stage > i + 1 ? 'bg-emerald-500/20 text-emerald-400' : 'text-slate-500'}`}>
                                            {i+1}. {label}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </header>

                    <DataSheetModal />

                    <main className="flex-1 p-6 md:p-10 max-w-[1200px] mx-auto w-full flex flex-col gap-8 pb-40">
                        
                        {/* Stage 1: 문제 정의 */}
                        {stage === 1 && (
                            <div className="space-y-8 fade-in">
                                <div className="flex justify-between items-end gap-6 text-left">
                                    <div className="space-y-2">
                                        <h2 className="text-3xl font-black tracking-tight flex items-center gap-3 italic"><Icon name="flag" className="text-indigo-600"/> 1. 문제 정의 (Problem Definition)</h2>
                                        <p className="text-slate-500 font-medium leading-relaxed">분석 프로젝트의 방향타가 될 '문제 정의'를 논리적으로 완성하십시오.</p>
                                    </div>
                                    <button onClick={() => setShowDataSheet(true)} className="flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-lg hover:bg-indigo-700 transition-all animate-pulse shrink-0"><Icon name="table" size={18}/> 원본 데이터 시트 열람</button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-slate-100 border border-slate-200 p-8 rounded-[32px] flex flex-col justify-center text-left">
                                        <h4 className="text-slate-900 font-black text-xl mb-4 flex items-center gap-2 underline decoration-indigo-300 decoration-4 underline-offset-4 italic">Case Scenario Summary</h4>
                                        <div className="space-y-4 text-slate-600 text-base leading-relaxed font-medium">
                                            <p><strong className="text-indigo-600">현상:</strong> 2년간 안정적이던 월 매출 5,200만원이 단 6개월 만에 3,000만원으로 급감했습니다.</p>
                                            <p><strong className="text-red-500">위기:</strong> 4월 손익분기점을 통과한 뒤, 5월부터는 매달 적자가 누적되어 폐업을 고려해야 하는 한계 상황입니다.</p>
                                            <p><strong className="text-slate-900">미션:</strong> 감으로 마케팅을 하거나 가격을 내리는 대신, <strong>정확히 어느 타겟의 무엇을 해결하여 적자를 탈출할지</strong> 정의해야 합니다.</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[32px] shadow-sm border border-slate-200">
                                        <h4 className="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest text-center italic">카페 전체 손익 추이 (P&L Trend)</h4>
                                        <div className="h-64 w-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <ComposedChart data={rawData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="month" axisLine={false} tickLine={false} tick={{fontSize: 12, fontWeight: 700}} />
                                                    <YAxis axisLine={false} tickLine={false} tick={{fontSize: 12}} />
                                                    <Tooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)' }} />
                                                    <Area type="monotone" dataKey="rev" fill="#818cf8" fillOpacity={0.1} stroke="none" />
                                                    <Line type="monotone" dataKey="rev" name="매출(만원)" stroke="#6366f1" strokeWidth={4} />
                                                    <Line type="monotone" dataKey="cost" name="비용(만원)" stroke="#94a3b8" strokeWidth={3} strokeDasharray="6 6" />
                                                </ComposedChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-900 rounded-[24px] p-8 text-white shadow-2xl space-y-8 text-left">
                                    <h3 className="text-amber-400 font-black uppercase tracking-widest text-sm flex items-center gap-2"><Icon name="edit-3" size={18}/> 문제 정의 프레임워크 완성</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="space-y-3">
                                            <p className="font-bold text-indigo-300">Q1. 결정 (무엇을 바꿀 것인가?)</p>
                                            {['외형적 매출 파이 확대', '적자 구조 개선(이익 회복)', '마케팅 채널 다각화'].map(opt => (
                                                <button key={opt} onClick={() => setS1Decision(opt)} className={`w-full text-left p-4 rounded-xl border-2 transition-all text-sm font-bold ${s1Decision === opt ? 'border-indigo-500 bg-indigo-500 text-white shadow-lg' : 'border-slate-700 text-slate-300 hover:border-slate-500'}`}>{opt}</button>
                                            ))}
                                        </div>
                                        <div className="space-y-3">
                                            <p className="font-bold text-emerald-300">Q2. 대상 (누구에 대한 결정인가?)</p>

                                    {[
                                        { id: 'opt1', title: '운영 병목 제거 (스마트 오더 전면 도입)', desc: '피크타임 대기 시간을 고객 임계점(22분) 미만인 10분 내외로 단축시켜, 단골 고객의 이탈 원인을 원천 차단합니다.', impact: '데이터 기반 최적 솔루션' },
                                        { id: 'opt2', title: '피크타임 전용 간편 메뉴(Ready-to-go) 출시', desc: '대기 시간을 줄일 수 있는 대안이나, 기존 객단가를 하락시켜 영업이익 개선 속도를 늦출 기회비용이 존재합니다.', impact: '기회비용 손실(차선책)' },
                                        { id: 'opt3', title: '고객 달래기 (대기 고객 무료 쿠폰 발급)', desc: 'CS 점수는 방어할 수 있으나, 비용 증가로 적자가 심화되며 병목이라는 근본 원인은 그대로 남습니다.', impact: '수단과 목적 전도' },
                                        { id: 'opt4', title: '브랜드 강화 (메뉴 리뉴얼 및 SNS 홍보)', desc: '신규 유입은 늘릴 수 있으나, 긴 대기 시간이 해결되지 않아 이들 역시 곧 이탈하는 결과를 낳습니다.', impact: '핵심 핀트 어긋남' }
                                    ].map(opt => (
                                        <button key={opt.id} onClick={() => setFinalDecision(opt.id)} className={`p-10 text-left border-4 rounded-[40px] transition-all relative group ${finalDecision === opt.id ? 'border-indigo-600 bg-white shadow-2xl scale-[1.02]' : 'border-slate-100 bg-white hover:border-slate-300 shadow-sm opacity-80 hover:opacity-100'}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <span className="text-2xl font-black italic text-slate-900 leading-tight">{opt.title}</span>
                                                <span className={`text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest shadow-sm ${finalDecision === opt.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{opt.impact}</span>
                                            </div>
                                            <p className="text-base text-slate-500 font-bold leading-relaxed">{opt.desc}</p>
                                        </button>
                                    ))}
                                </div>
                                {errorFeedback && <div className="p-6 bg-red-50 border-2 border-red-200 rounded-[32px] text-red-600 font-black text-center shadow-lg animate-in slide-in-from-top-2">{errorFeedback}</div>}
                                <button 
                                    onClick={() => {
                                        if (finalDecision !== 'opt1') { setErrorFeedback("분석 오류: 당신이 찾은 데이터 임계점을 해결하고, 목표인 '이익 개선'을 동시에 달성하는 최적해를 다시 고려하십시오."); return; }
                                        nextStage();
                                    }} 
                                    className="w-full mt-10 bg-slate-900 text-white py-8 rounded-[32px] font-black text-2xl hover:bg-indigo-700 transition-all active:scale-95 shadow-2xl disabled:opacity-30 uppercase italic tracking-widest"
                                    disabled={!finalDecision}
                                >
                                    최종 기획 리포트 제출 및 시뮬레이션 종료
                                </button>
                            </div>
                        )}

                        {/* Stage 6: 결과 화면 */}
                        {stage === 6 && (
                            <div className="min-h-screen bg-slate-900 fixed inset-0 z-[200] flex items-center justify-center p-6 fade-in overflow-auto py-10 scrollbar-hide">
                                <div className="max-w-4xl w-full bg-white rounded-[60px] overflow-hidden shadow-2xl flex flex-col border-8 border-indigo-600/20">
                                    <div className="p-20 text-center text-white relative bg-indigo-600 overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                                            <div className="absolute top-10 left-10 w-40 h-40 border-8 border-white rounded-full"></div>
                                            <div className="absolute bottom-10 right-10 w-60 h-60 border-8 border-white rounded-full"></div>
                                        </div>
                                        <div className="w-24 h-24 bg-white/20 rounded-[40px] flex items-center justify-center mx-auto mb-10 rotate-12 backdrop-blur-md border border-white/30 shadow-2xl">
                                            <Icon name="award" size={60} />
                                        </div>
                                        <h2 className="text-6xl font-black mb-4 tracking-tighter uppercase italic tracking-tight">Project Complete</h2>
                                        <p className="text-indigo-100 font-black text-2xl tracking-widest uppercase">데이터 기획 역량 인증 (Master Grade)</p>
                                    </div>
                                    <div className="p-16 flex-1 flex flex-col justify-center">
                                        <div className="bg-slate-50 p-12 rounded-[48px] text-center border-2 border-slate-200 mb-10 shadow-inner">
                                            <h4 className="font-black text-3xl text-slate-800 mb-8 border-b-4 border-indigo-100 pb-4 inline-block italic text-center">Executive Summary</h4>
                                            <p className="text-slate-600 text-lg md:text-xl leading-relaxed font-bold space-y-6 text-left">
                                                <span className="block italic">"당신은 마케팅비 증가나 CS 점수 하락 같은 <span className="text-slate-900 bg-amber-200 px-2 rounded">표면적 소음(Noise)</span>에 속지 않고,<br/>매출 급감의 진짜 원인인 '단골 고객'과 '대기 시간'의 인과관계를 정확히 좁혀냈습니다."</span>
                                                <span className="block mt-4">특히 고객이 이탈하는 <span className="text-indigo-600 font-black">심리적 임계점(22분)</span>을 발견한 것은 최고 수준의 데이터 리터러시를 증명하는 결정적 근거입니다.</span>
                                            </p>
                                        </div>
                                        
                                        <div className="mt-4 p-10 bg-indigo-50 border-4 border-indigo-100 rounded-[40px] text-left shadow-lg">
                                            <h4 className="font-black text-indigo-900 mb-6 flex items-center gap-3 text-2xl uppercase italic tracking-widest"><Icon name="book-open" size={32}/> Deep Learning Process</h4>
                                            <p className="text-lg md:text-xl text-indigo-800 mb-10 leading-relaxed font-bold">
                                                단순히 문제를 푼 것으로 만족하지 마십시오.<br/>
                                                실무 분석가의 관점에서 각 기획 단계에 숨겨진 <strong>논리적 함정(Red Herrings)</strong>을<br/>
                                                철저하게 해체하는 복기 리포트를 반드시 확인하십시오.
                                            </p>
                                            <button onClick={nextStage} className="w-full py-7 bg-indigo-600 text-white rounded-3xl font-black hover:bg-indigo-700 transition-all shadow-2xl active:scale-95 text-2xl uppercase italic tracking-widest">
                                                데이터 기획 복기 (Post-Mortem) 시작
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Stage 7: Post-Mortem (학습 리포트) */}
                        {stage === 7 && (
                            <div className="space-y-12 fade-in pb-20 text-left">
                                <div className="space-y-4 mb-14 text-center">
                                    <h2 className="text-5xl font-black tracking-tight flex items-center justify-center gap-4 italic uppercase"><Icon name="file-text" className="text-indigo-600" size={48}/> Analysis Post-Mortem</h2>
                                    <p className="text-slate-500 font-black text-xl tracking-widest">데이터 기획 5단계에 숨겨진 '논리적 오류'를 해체합니다.</p>
                                </div>

                                <div className="flex flex-col md:flex-row gap-10 items-start">
                                    <div className="w-full md:w-1/3 flex flex-col gap-4 sticky top-24">
                                        {reviewSteps.map((step, idx) => (
                                            <button key={idx} onClick={() => setReviewTab(idx)} className={`p-6 rounded-[32px] text-left font-black transition-all border-4 text-base ${reviewTab === idx ? 'bg-indigo-600 text-white border-indigo-600 shadow-2xl translate-x-4' : 'bg-white text-slate-500 border-slate-200 hover:border-indigo-200'}`}>
                                                {step}
                                            </button>
                                        ))}
                                        <button onClick={reset} className="mt-12 p-6 bg-slate-900 text-white rounded-[32px] font-black hover:bg-indigo-600 transition-all text-center flex items-center justify-center gap-3 text-lg uppercase italic shadow-xl">
                                            <Icon name="rotate-ccw" /> Re-enter Simulation
                                        </button>
                                    </div>

                                    <div className="w-full md:w-2/3 bg-white rounded-[56px] shadow-2xl border-2 border-slate-100 p-12 md:p-16 min-h-[600px] flex flex-col justify-center">
                                        {reviewTab === 0 && (
                                            <div className="space-y-8 fade-in">
                                                <h3 className="text-4xl font-black text-slate-900 mb-6 border-b-8 border-indigo-100 pb-6 italic">1. 문제 정의의 함정</h3>
                                                <p className="text-slate-600 leading-relaxed text-xl font-bold">표면적인 CS 점수 하락이나 마케팅 효율에 속으셨나요?</p>
                                                <div className="p-8 bg-indigo-50 rounded-[32px] border-4 border-indigo-100 shadow-inner">
                                                    <p className="font-black text-indigo-700 mb-4 text-2xl italic tracking-tighter">💡 Professional Insight</p>
                                                    <p className="text-lg leading-relaxed text-slate-700 font-bold text-left text-left">문제 정의는 <strong>목적(영업이익)과 수단(CS점수)을 분리</strong>하는 것에서 시작합니다. '포장 고객'이라는 오답을 피하고 '재방문 단골'이라는 핵심 환부를 쪼개어(Segmentation) 본 것이 성공의 핵심입니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 1 && (
                                            <div className="space-y-8 fade-in">
                                                <h3 className="text-4xl font-black text-slate-900 mb-6 border-b-8 border-indigo-100 pb-6 italic">2. 가설의 논리적 배제</h3>
                                                <p className="text-slate-600 leading-relaxed text-xl font-bold">경쟁사가 나타나면 무조건 경쟁사 때문일까요?</p>
                                                <div className="p-8 bg-indigo-50 rounded-[32px] border-4 border-indigo-100 shadow-inner">
                                                    <p className="font-black text-indigo-700 mb-4 text-2xl italic tracking-tighter">💡 Professional Insight</p>
                                                    <p className="text-lg leading-relaxed text-slate-700 font-bold text-left text-left text-left">데이터 분석가는 <strong>'기여도(Scale)'</strong>를 봅니다. 폐기량 증가로 인한 비용 손실보다 매출 하락폭이 압도적으로 큽니다. 경쟁사 오픈에도 '신규 매출'이 일정하다면, 문제는 외부가 아닌 내부의 <strong>서비스 병목(대기 시간)</strong>에 있었던 것입니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 2 && (
                                            <div className="space-y-8 fade-in text-left">
                                                <h3 className="text-4xl font-black text-slate-900 mb-6 border-b-8 border-indigo-100 pb-6 italic text-left">3. 검증 모델의 필수 조건</h3>
                                                <p className="text-slate-600 leading-relaxed text-xl font-bold">데이터를 뭉쳐서(Aggregation) 보면 아무것도 보이지 않습니다.</p>
                                                <div className="p-8 bg-indigo-50 rounded-[32px] border-4 border-indigo-100 shadow-inner">
                                                    <p className="font-black text-indigo-700 mb-4 text-2xl italic tracking-tighter">💡 Professional Insight</p>
                                                    <p className="text-lg leading-relaxed text-slate-700 font-bold text-left text-left text-left text-left text-left">"대기시간이 문제다"라는 가설을 증명하려면 반드시 <strong>[시간대별]</strong>이라는 비교 그룹이 필요합니다. 한산한 오전의 대기시간과 피크타임의 대기시간을 이탈률과 교차 분석해야만 비로소 데이터는 말을 하기 시작합니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 3 && (
                                            <div className="space-y-8 fade-in text-left">
                                                <h3 className="text-4xl font-black text-slate-900 mb-6 border-b-8 border-indigo-100 pb-6 italic text-left text-left">4. 임계점(Threshold)의 발견</h3>
                                                <p className="text-slate-600 leading-relaxed text-xl font-bold">데이터 기획의 고수는 '특이점'을 찾아냅니다.</p>
                                                <div className="p-8 bg-amber-50 rounded-[32px] border-4 border-amber-200 shadow-inner">
                                                    <p className="font-black text-amber-700 mb-4 text-2xl italic tracking-tighter">🔥 Core Competency</p>
                                                    <p className="text-lg leading-relaxed text-slate-700 font-bold text-left text-left text-left text-left text-left text-left text-left">대기시간이 14분일 때 이탈률은 18%였지만, 22분이 되자 65%로 폭발했습니다. 이는 고객의 심리적 마지노선이 20분 내외임을 뜻합니다. <strong>단순히 "빨리 만들자"가 아니라 "무조건 20분 안쪽으로 들어와야 한다"는 구체적인 KPI</strong>를 도출하는 것이 실력입니다.</p>
                                                </div>
                                            </div>
                                        )}
                                        {reviewTab === 4 && (
                                            <div className="space-y-8 fade-in text-left">
                                                <h3 className="text-4xl font-black text-slate-900 mb-6 border-b-8 border-indigo-100 pb-6 italic text-left text-left text-left">5. 기회비용과 솔루션 일치</h3>
                                                <p className="text-slate-600 leading-relaxed text-xl font-bold">분석은 논리적으로 해놓고, 실행은 '싼 것'만 찾지 않았나요?</p>
                                                <div className="p-8 bg-indigo-50 rounded-[32px] border-4 border-indigo-100 shadow-inner">
                                                    <p className="font-black text-indigo-700 mb-4 text-2xl italic tracking-tighter">💡 Professional Insight</p>
                                                    <p className="text-lg leading-relaxed text-slate-700 font-bold text-left text-left text-left text-left text-left text-left text-left text-left">적자 개선을 위해서는 매출을 갉아먹는 '근본 병목'을 뚫어야 합니다. 쿠폰 발행이나 저가 원재료 사용은 당장의 수치는 바꿀지 모르나 브랜드 신뢰도를 더 빠르게 무너뜨립니다. 데이터를 믿고 <strong>시스템적 투자(스마트 오더)</strong>를 결단하는 것이 전략적 사고입니다.</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 하단 고정 플로팅 버튼바 */}
                    {stage > 0 && stage < 6 && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 flex gap-4 z-50">
                            <button onClick={prevStage} className="px-10 py-5 bg-white/90 backdrop-blur-md text-slate-500 border border-slate-200 rounded-[32px] font-black text-sm uppercase tracking-widest hover:bg-slate-100 shadow-2xl flex items-center gap-3 transition-all hover:scale-105 active:scale-95">
                                <Icon name="arrow-left" size={20}/> Back
                            </button>
                            <button onClick={() => setShowDataSheet(true)} className="px-10 py-5 bg-indigo-600 text-white rounded-[32px] font-black text-sm uppercase tracking-widest hover:bg-indigo-700 shadow-2xl flex items-center gap-3 transition-all hover:scale-105 active:scale-95 shadow-indigo-500/30">
                                <Icon name="table" size={20}/> View Raw Data Sheet
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
